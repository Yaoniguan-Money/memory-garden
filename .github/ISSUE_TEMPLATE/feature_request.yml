name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please check that your feature request is in scope for Memory Garden before submitting.
        Out of scope: LLM provider integrations, vector databases, Web UI, cloud sync, SaaS features.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see implemented?
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - "Layer 1: Garden Life Core"
        - "Layer 2: Garden Runtime"
        - "Layer 3: Harvest Pipeline"
        - "Layer 4: Garden Observatory"
        - "Layer 5: Integration"
        - "Layer 6: Garden Lab"
        - "Layer 7: Lab Cookbook"
        - "Layer 8: Garden Covenant"
        - "Layer 9: Manual & Nursery"
        - "New layer or cross-cutting"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
  - type: checkboxes
    id: scope_check
    attributes:
      label: Scope Check
      options:
        - label: This does not require adding LLM provider SDKs as dependencies
        - label: This does not require adding vector databases or embedding models
        - label: This does not require network calls or cloud services
        - label: This does not add a Web UI or CLI product
