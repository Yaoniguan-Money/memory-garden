name: Bug Report
description: Report a bug in Memory Garden
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version or commit are you on?
      placeholder: "v0.8.0 or commit hash"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "3.10"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the bug
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback
      description: If applicable, paste the full traceback
      render: text
  - type: input
    id: layer
    attributes:
      label: Affected Layer
      description: Which layer does this affect?
      placeholder: "e.g., Layer 2: Garden Runtime"
